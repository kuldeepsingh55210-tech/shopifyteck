<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ORYQX AutoSupport AI - Enterprise Dashboard</title>
    <!-- Shopify App Bridge Config -->
    <meta name="shopify-api-key" content="%VITE_SHOPIFY_API_KEY%" />
    <script>
      // Ensure host and shop parameters are preserved in the iframe context
      if (window.parent !== window) {
        const params = new URLSearchParams(window.location.search);
        if (!params.has('host')) {
          const savedHost = localStorage.getItem('shopify_host');
          if (savedHost) {
            params.set('host', savedHost);
            const shop = params.get('shop') || localStorage.getItem('shop_domain') || '';
            if (shop) params.set('shop', shop);
            window.location.search = params.toString();
          }
        }
      }
    </script>
    <script src="https://cdn.shopify.com/shopifycloud/app-bridge.js"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  </head>
  <body class="bg-[#0A0B0F] text-[#e3e2e8] min-h-screen overflow-x-hidden antialiased transition-colors duration-300">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
